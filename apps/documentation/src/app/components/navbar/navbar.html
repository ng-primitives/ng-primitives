<header
  class="border-border-subtle bg-surface/70 fixed top-0 z-20 w-full border-b pt-[env(safe-area-inset-top,0px)] pr-[env(safe-area-inset-right,0px)] pl-[env(safe-area-inset-left,0px)] backdrop-blur-xl"
>
  <nav class="relative mx-auto flex h-16 w-full max-w-[90rem] items-center gap-x-4 px-8">
    <button
      class="text-fg-tertiary data-hover:bg-surface-raised data-hover:text-fg data-press:bg-surface-sunken data-focus-visible:ring-primary inline-flex size-8 shrink-0 items-center justify-center rounded-md outline-hidden transition-colors data-focus-visible:ring-2 lg:hidden"
      (click)="toggle()"
      [attr.aria-expanded]="menuOpen()"
      aria-controls="mobile-navigation"
      aria-label="Open navigation menu"
      ngpButton
    >
      <ng-icon class="text-base" name="lucideMenu" />
    </button>

    <a class="shrink-0" routerLink="/" aria-label="Angular Primitives Homepage">
      <img
        class="hidden h-10 lg:block dark:hidden"
        src="assets/logo.svg"
        alt="Angular Primitives"
      />
      <img class="hidden h-10 dark:lg:block" src="assets/logo-dark.svg" alt="Angular Primitives" />
      <img
        class="block h-8 w-auto lg:hidden"
        src="assets/logo-small.svg"
        alt="Angular Primitives"
      />
    </a>

    <div class="ml-auto flex items-center gap-x-1 sm:gap-x-1.5 md:ml-0 md:w-full">
      <div class="md:ml-auto">
        <div id="docsearch"></div>
      </div>

      <div class="inline-flex items-center gap-x-0.5 md:ml-auto">
        <a
          class="text-fg-tertiary data-hover:bg-surface-raised data-hover:text-fg data-press:bg-surface-sunken data-focus-visible:text-fg data-focus-visible:ring-primary inline-flex h-8 items-center gap-x-1.5 rounded-md px-2.5 text-[13px] font-medium outline-hidden transition-colors data-focus-visible:ring-2"
          target="_blank"
          rel="noopener noreferrer"
          href="https://github.com/sponsors/ng-primitives"
          aria-label="Sponsor us on GitHub"
          ngpButton
        >
          <ng-icon class="text-[15px]" name="lucideHeart" />
          <span class="hidden md:inline">Sponsor</span>
        </a>

        <div class="bg-border-strong mx-1.5 h-5 w-px"></div>

        <button
          class="text-fg-tertiary data-hover:bg-surface-raised data-hover:text-fg data-press:bg-surface-sunken data-focus-visible:text-fg data-focus-visible:ring-primary inline-flex size-8 items-center justify-center rounded-md outline-hidden transition-colors data-focus-visible:ring-2"
          docs-theme-toggler
        >
          <span class="sr-only">Toggle theme</span>
        </button>

        <a
          class="text-fg-tertiary data-hover:bg-surface-raised data-hover:text-fg data-press:bg-surface-sunken data-focus-visible:text-fg data-focus-visible:ring-primary inline-flex size-8 items-center justify-center rounded-md outline-hidden transition-colors data-focus-visible:ring-2"
          target="_blank"
          rel="noopener noreferrer"
          href="https://discord.gg/NTdjc5r3gC"
          aria-label="Join our Discord community"
          ngpButton
        >
          <ng-icon class="text-base" name="bootstrapDiscord" />
        </a>

        <a
          class="text-fg-tertiary data-hover:bg-surface-raised data-hover:text-fg data-press:bg-surface-sunken data-focus-visible:text-fg data-focus-visible:ring-primary inline-flex size-8 items-center justify-center rounded-md outline-hidden transition-colors data-focus-visible:ring-2"
          target="_blank"
          rel="noopener noreferrer"
          href="https://github.com/ng-primitives/ng-primitives/"
          aria-label="View source code on GitHub"
          ngpButton
        >
          <ng-icon class="text-base" name="bootstrapGithub" />
        </a>
      </div>
    </div>
  </nav>
</header>
