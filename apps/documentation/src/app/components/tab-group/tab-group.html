<div class="border-border-default mb-3 flex gap-x-4 border-b">
  @for (tab of tabs(); track tab.label()) {
  <button
    class="focus-visible:ring-primary -mb-px h-10 border-b-2 text-sm font-medium outline-hidden transition-colors focus-visible:ring-2 focus-visible:ring-offset-2"
    [ngClass]="{
        'border-primary text-fg': activeTab()?.label() === tab.label(),
        'text-fg-tertiary hover:text-fg border-transparent': activeTab()?.label() !== tab.label(),
      }"
    (click)="activeTab.set(tab)"
  >
    {{ tab.label() }}
  </button>
  }
</div>

<ng-content />
