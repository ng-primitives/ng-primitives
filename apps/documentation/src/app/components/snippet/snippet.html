<div class="not-prose relative flex flex-col items-center justify-center">
  <div class="relative w-full flex-1">
    <div class="border-border-subtle bg-code overflow-hidden rounded-xl border">
      <div class="border-border-subtle flex items-stretch border-b">
        <!-- Tabs scroll horizontally so they never push the copy button. -->
        <div
          class="no-scrollbar flex min-w-0 flex-1 items-stretch overflow-x-auto overflow-y-hidden"
        >
          @for (file of files(); track file.label) {
          <button
            class="group text-fg-tertiary relative flex shrink-0 items-center px-2 py-2 font-medium whitespace-nowrap outline-hidden"
            [attr.aria-selected]="selectedFile() === file.label"
            (click)="selectedFile.set(file.label)"
            role="tab"
            type="button"
          >
            <div
              class="group-hover:bg-surface-raised group-hover:text-fg inline-flex h-6 items-center rounded-md px-2 text-xs transition-colors"
              [class.bg-surface-raised]="selectedFile() === file.label"
              [class.text-fg]="selectedFile() === file.label"
            >
              {{ file.label }}
            </div>

            @if (selectedFile() === file.label) {
            <div
              class="bg-primary pointer-events-none absolute inset-x-2 bottom-0 h-0.5 rounded-full"
            ></div>
            }
          </button>
          }
        </div>

        <!-- Fixed-size icon button: swaps to a check on copy, no reflow. -->
        <button
          class="text-fg-tertiary hover:bg-surface-raised hover:text-fg focus-visible:ring-primary me-1.5 flex size-8 shrink-0 items-center justify-center self-center rounded-md text-base outline-hidden transition-colors focus-visible:ring-2"
          [attr.aria-label]="isCopied() ? 'Copied' : 'Copy code'"
          (click)="copyToClipboard()"
          type="button"
        >
          @if (isCopied()) {
          <ng-icon class="text-primary" name="heroCheck" />
          } @else {
          <ng-icon name="heroSquare2Stack" />
          }
        </button>

        <span class="sr-only" role="status" aria-live="polite">
          {{ isCopied() ? 'Copied to clipboard' : '' }}
        </span>
      </div>

      <div class="h-fit" [innerHTML]="code()"></div>
    </div>
  </div>
</div>
