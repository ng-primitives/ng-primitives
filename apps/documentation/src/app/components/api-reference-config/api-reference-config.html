@if (resolvedData().length) {
<div
  class="not-prose my-5 overflow-hidden rounded-lg border border-zinc-200 text-[13px] leading-normal dark:border-zinc-800"
>
  <!-- Header -->
  <div
    class="grid bg-zinc-50 py-2 pr-2 pl-3 text-zinc-500 dark:bg-zinc-900 dark:text-zinc-400"
    style="grid-template-columns: 3fr 4fr 5fr"
  >
    <span>Prop</span>
    <span>Type</span>
    <span>Description</span>
  </div>

  <!-- Rows -->
  @for (item of resolvedData(); track item.name) {
  <div
    class="grid items-baseline border-t border-zinc-200 py-2 pr-2 pl-3 dark:border-zinc-800"
    style="grid-template-columns: 3fr 4fr 5fr"
  >
    <span class="api-cell pr-3">
      <code class="font-mono text-zinc-900 dark:text-white">{{ item.name }}</code>
    </span>
    <span class="api-cell pr-3">
      <code class="font-mono text-indigo-600 dark:text-indigo-400">{{ item.type }}</code>
      @if (item.default) {
      <span class="ml-1 text-zinc-400 dark:text-zinc-500">= {{ item.default }}</span>
      }
    </span>
    <span class="text-zinc-600 dark:text-zinc-400">{{ item.description }}</span>
  </div>
  }
</div>
}
