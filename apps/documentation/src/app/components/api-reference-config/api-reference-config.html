@if (resolvedData().length) {
<div
  class="not-prose border-border-default my-5 overflow-hidden rounded-lg border text-[13px] leading-normal"
>
  <!-- Header -->
  <div
    class="bg-surface-raised text-fg-tertiary grid py-2 pr-2 pl-3"
    style="grid-template-columns: 3fr 4fr 5fr"
  >
    <span>Prop</span>
    <span>Type</span>
    <span>Description</span>
  </div>

  <!-- Rows -->
  @for (item of resolvedData(); track item.name) {
  <div
    class="border-border-default grid items-baseline border-t py-2 pr-2 pl-3"
    style="grid-template-columns: 3fr 4fr 5fr"
  >
    <span class="api-cell pr-3">
      <code class="text-fg font-mono">{{ item.name }}</code>
    </span>
    <span class="api-cell pr-3">
      <code class="text-fg-secondary font-mono">{{ item.type }}</code>
      @if (item.default !== undefined) {
      <span class="text-fg-tertiary ml-1">= {{ item.default }}</span>
      }
    </span>
    <span class="text-fg-secondary">{{ item.description }}</span>
  </div>
  }
</div>
}
