@if (resolvedData().length) {
<div
  class="not-prose border-border-default my-5 overflow-hidden rounded-lg border text-[13px] leading-normal"
>
  <!-- Header -->
  <div
    class="bg-surface-raised text-fg-tertiary grid py-2 pr-2 pl-3"
    [style.grid-template-columns]="hasValues() ? '2fr 3fr 2fr' : '2fr 3fr'"
  >
    <span>Attribute</span>
    <span>Description</span>
    @if (hasValues()) {
    <span>Value</span>
    }
  </div>

  <!-- Rows -->
  @for (item of resolvedData(); track item.attribute) {
  <div
    class="border-border-default grid items-baseline border-t py-2 pr-2 pl-3"
    [style.grid-template-columns]="hasValues() ? '2fr 3fr 2fr' : '2fr 3fr'"
  >
    <span>
      <code class="text-fg-secondary font-mono">{{ item.attribute }}</code>
    </span>
    <span class="text-fg-secondary">{{ item.description }}</span>
    @if (hasValues()) {
    <span>
      @if (item.value) {
      <code class="text-fg-secondary font-mono">{{ item.value }}</code>
      }
    </span>
    }
  </div>
  }
</div>
}
